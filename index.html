<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timestamp Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-6">

  <h1 class="text-2xl font-bold mb-4">Timestamp Tracker</h1>

  <!-- Input form -->
  <div class="w-full max-w-md bg-white p-4 rounded shadow">
    <input 
      id="updateInput" 
      type="text" 
      maxlength="200"
      placeholder="Enter your update..."
      class="border w-full rounded p-2 mb-3"
    />
    <button 
      id="saveBtn"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded"
    >Save Update</button>
  </div>

  <!-- Update list -->
  <div class="w-full max-w-md mt-6">
    <h2 class="font-semibold mb-2">History</h2>
    <ul id="updateList" class="space-y-2"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { 
      getFirestore, doc, getDoc, runTransaction, onSnapshot, Timestamp 
    } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    // Firebase config (yours)
    const firebaseConfig = {
      apiKey: "AIzaSyAfGzkSg6U49-wXy-mvMd2OdqJ3qHo5Ouk",
      authDomain: "beta8-434f9.firebaseapp.com",
      projectId: "beta8-434f9",
      storageBucket: "beta8-434f9.firebasestorage.app",
      messagingSenderId: "948269597618",
      appId: "1:948269597618:web:506b43105b755686a01aab",
      measurementId: "G-YCF71WWJ97"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // DOM
    const inputEl = document.getElementById("updateInput");
    const saveBtn = document.getElementById("saveBtn");
    const listEl  = document.getElementById("updateList");

    const docRef = doc(db, "timestampTracker", "main");

    // Format helper
    const fmt = ts => ts?.toDate?.().toLocaleString() ?? "";

    // Render updates
    function renderList(history) {
      listEl.innerHTML = "";
      history.forEach(entry => {
        const li = document.createElement("li");
        li.className = "p-3 bg-white rounded shadow flex justify-between items-center";
        li.innerHTML = `
          <span>${entry.text || "(empty)"}</span>
          <span class="text-xs text-gray-500">${fmt(entry.updatedAt)}</span>
        `;
        listEl.appendChild(li);
      });
    }

    // Live listener
    onSnapshot(docRef, snap => {
      const data = snap.data();
      const history = data?.history ?? [];
      renderList(history);
    });

    // Save new update
    async function saveUpdate() {
      const text = inputEl.value.trim();
      if (!text) return;
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(docRef);
        const data = snap.exists() ? snap.data() : {};
        const history = Array.isArray(data.history) ? data.history : [];

        const nowTs = Timestamp.now();
        // Insert new at top
        history.unshift({ text, updatedAt: nowTs });

        tx.set(docRef, { history }, { merge: true });
      });
      inputEl.value = "";
    }

    saveBtn.addEventListener("click", saveUpdate);
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter") saveUpdate();
    });

  </script>
</body>
</html>
