<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Area Status Grid – Public</title>

  <!-- Supabase JS v2 -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --cell-width: 150px;
      --cell-height: 100px;
      --primary: #2196f3;
      --success: #4caf50;
      --danger:  #f44336;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 { margin: 30px 0 20px 0; font-size: 2rem; }

    /* ---------- GRID ---------- */
    .grid-container {
      display: grid;
      grid-template-columns: 100px repeat(6, var(--cell-width));
      gap: 10px;
      margin-bottom: 50px;
    }
    .module-label {
      width: 100px;
      height: var(--cell-height);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      background-color: #e0e0e0;
      border: 2px solid #333;
      border-radius: 8px;
      user-select: none;
    }
    .area {
      width: var(--cell-width);
      height: var(--cell-height);
      border: 2px solid #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      overflow: hidden;
      padding: 5px;
      font-size: 14px;
      transition: background-color 0.3s;
      position: relative;
      border-radius: 8px;
      user-select: none;
    }
    .area.updated   { background-color: #90ee90; }
    .area.untouched { background-color: #add8e6; }
    .area:hover { filter: brightness(90%); }

    .blinking-light {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 10px;
      height: 10px;
      background-color: red;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%{opacity:1;}50%{opacity:0;}100%{opacity:1;} }

    .timestamp { font-size: 11px; margin-top: 4px; color: #555; }

    /* ---------- MODALS ---------- */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      width: 320px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,.15);
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-content input {
      width: 85%;
      padding: 10px;
      margin: 10px 0 20px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .modal-content button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      color:#fff;
    }
    .save-btn   { background: var(--success); }
    .cancel-btn { background: var(--danger); }

    /* ---------- TIMELINE ---------- */
    .timeline {
      border-left: 3px solid var(--primary);
      padding-left: 10px;
      margin-top: 10px;
    }
    .timeline-entry {
      margin-bottom: 16px;
      position: relative;
    }
    .timeline-entry::before {
      content: '';
      position: absolute;
      left: -10px;
      top: 4px;
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .timeline-entry time {
      font-size: 12px;
      font-weight: bold;
      color: #333;
    }
    .timeline-entry .status-change { color: #555; }
  </style>
</head>
<body>
  <h1>Area Status Grid</h1>

  <div class="grid-container" id="grid"></div>

  <!-- -------------- UPDATE MODAL -------------- -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Update Area Status</h2>
      <input type="text" id="statusInput" maxlength="50" placeholder="Enter status" />
      <div>
        <button class="save-btn"   id="saveBtn">Save</button>
        <button class="cancel-btn" id="cancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- -------------- HISTORY MODAL -------------- -->
  <div class="modal" id="historyModal">
    <div class="modal-content" style="width:380px;">
      <h2>Update History</h2>
      <ul id="historyList" class="timeline"></ul>
      <button class="cancel-btn" id="historyCloseBtn" style="margin-top:10px;">Close</button>
    </div>
  </div>

  <!-- -------------- SCRIPT -------------- -->
  <script>
    /* ============================
       🔌 Supabase Config – PUBLIC
    ============================ */
    const SUPABASE_URL      = 'https://kxbpsfxcploqijsinxes.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4YnBzZnhjcGxvcWlqc2lueGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI1NjAzNTMsImV4cCI6MjA2ODEzNjM1M30.CQr9DvVf2are2VnK9VLviKBWlN401n-U2gOXrg5F5OE';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ============================
       📊 Constants & State
    ============================ */
    const MODULES   = 7; // rows
    const POSITIONS = 6; // cols

    let gridData   = Array.from({ length: MODULES }, () => Array(POSITIONS).fill(null));
    let currentAreaId = null;

    /* ============================
       🚀 Init on page load
    ============================ */
    document.addEventListener('DOMContentLoaded', () => {
      fetchGrid();
      subscribeRealtime();
    });

    /* ============================
       🔄 Realtime subscription
    ============================ */
    function subscribeRealtime() {
      supabase
        .channel('public:areas')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'areas' }, payload => {
          const area = payload.new;
          if (!area) return;
          const [row, col] = area.area_id.split('-').map(Number);
          gridData[row][col] = area;
          renderCell(row, col);
        })
        .subscribe();
    }

    /* ============================
       📥 Fetch entire grid once
    ============================ */
    async function fetchGrid() {
      const { data, error } = await supabase.from('areas').select('*');
      if (error) { console.error(error); return; }
      gridData = Array.from({ length: MODULES }, () => Array(POSITIONS).fill(null));
      data.forEach(a => {
        const [r, c] = a.area_id.split('-').map(Number);
        gridData[r][c] = a;
      });
      renderGrid();
    }

    /* ============================
       🖌️ Render functions
    ============================ */
    const grid = document.getElementById('grid');

    function renderGrid() {
      grid.innerHTML = '';
      for (let row = 0; row < MODULES; row++) {
        const label = document.createElement('div');
        label.className = 'module-label';
        label.textContent = `Module ${row + 1}`;
        grid.appendChild(label);
        for (let col = 0; col < POSITIONS; col++) renderCell(row, col);
      }
    }

    function renderCell(row, col) {
      // Compute index in DOM: label + preceding cells
      const index = row * (POSITIONS + 1) + col + 1;
      let cell = grid.children[index];
      if (!cell) {
        cell = document.createElement('div');
        grid.appendChild(cell);
      }
      cell.className = 'area';

      const data = gridData[row][col];
      if (data?.status) cell.classList.add('updated');
      else cell.classList.add('untouched');

      cell.innerHTML = '';
      cell.dataset.row = row;
      cell.dataset.col = col;

      const statusDiv = document.createElement('div');
      statusDiv.textContent = data?.status || 'Click to update';
      cell.appendChild(statusDiv);
      if (data?.updated_at) {
        const ts = document.createElement('div');
        ts.className = 'timestamp';
        ts.textContent = new Date(data.updated_at).toLocaleString();
        cell.appendChild(ts);
      }
      if (data?.status) {
        const light = document.createElement('div');
        light.className = 'blinking-light';
        cell.appendChild(light);
      }

      cell.onclick = () => openModal(row, col);
      cell.ondblclick = e => { e.stopPropagation(); openHistory(`${row}-${col}`); };
    }

    /* ============================
       ✏️ Modal handlers
    ============================ */
    const modal          = document.getElementById('modal');
    const statusInput    = document.getElementById('statusInput');
    const saveBtn        = document.getElementById('saveBtn');
    const cancelBtn      = document.getElementById('cancelBtn');

    function openModal(row, col) {
      currentAreaId = `${row}-${col}`;
      statusInput.value = gridData[row][col]?.status || '';
      modal.style.display = 'flex';
      statusInput.focus();
    }
    function closeModal() { modal.style.display = 'none'; currentAreaId = null; }

    statusInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveStatus(); });
    saveBtn.onclick   = saveStatus;
    cancelBtn.onclick = closeModal;

    async function saveStatus() {
      if (!currentAreaId) return;
      const newStatus = statusInput.value.trim();
      const { data, error } = await supabase.from('areas').upsert({
        area_id: currentAreaId,
        status: newStatus,
        updated_at: new Date().toISOString()
      }).select().single();
      if (!error) {
        await supabase.from('logs').insert({ area_id: currentAreaId, status: newStatus });
      }
      closeModal();
    }

    /* ============================
       📜 History modal
    ============================ */
    const historyModal   = document.getElementById('historyModal');
    const historyList    = document.getElementById('historyList');
    const historyCloseBtn= document.getElementById('historyCloseBtn');

    historyCloseBtn.onclick = () => historyModal.style.display = 'none';

    async function openHistory(areaId) {
      const { data, error } = await supabase
        .from('logs')
        .select('*')
        .eq('area_id', areaId)
        .order('created_at', { ascending: false });
      if (error) { console.error(error); return; }
      historyList.innerHTML = '';
      if (!data.length) {
        historyList.innerHTML = '<li>No history yet</li>';
      } else {
        data.forEach(l => {
          const li = document.createElement('li');
          li.className = 'timeline-entry';
          li.innerHTML = `<time>${new Date(l.created_at).toLocaleString()}</time><br><span class="status-change">${l.status}</span>`;
          historyList.appendChild(li);
        });
      }
      historyModal.style.display = 'flex';
    }
  </script>
</body>
</html>
