
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6x7 Area Status Grid</title>
    <style>
        body {
            Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
        }
        h1 {
            20px 0;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 100px repeat(6, 150px);
            gap: 10px;
            20px;
        }
        .module-label {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            background-color: #e0e0e0;
            border: 2px solid #333;
        }
        .area {
            width: 150px;
            height: 100px;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            overflow: hidden;
            padding: 5px;
            font-size: 14px;
            transition: background-color 0.3s;
            position: relative;
        }
        .area.updated {
            background-color: #90EE90; /* Green for modified areas */
        }
        .area.untouched {
            background-color: #ADD8E6; /* Blue for untouched areas */
        }
        .area:hover {
            filter: brightness(90%);
        }
        .blinking-light {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 10px;
            height: 10px;
            background-color: red;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            width: 300px;
            text-align: center;
        }
        .modal-content input {
            width: 80%;
            padding: 10px;
            10px 0;
        }
        .modal-content button {
            padding: 10px 20px;
            5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Area Status Grid</h1>
    <div class="grid-container" id="grid"></div>
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Update Area Status</h2>
            <input type="text" id="statusInput" maxlength="50" placeholder="Enter status">
            <button onclick="saveStatus()">Save</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const modal = document.getElementById('modal');
        const statusInput = document.getElementById('statusInput');
        let currentArea = null;

        // Initialize grid data from localStorage or create new
        let gridData = JSON.parse(localStorage.getItem('gridData')) || Array(7).fill().map(() => Array(6).fill(''));

        // Render the grid
        function renderGrid() {
            grid.innerHTML = '';
            for (let row = 0; row < 7; row++) {
                // Add module label
                const label = document.createElement('div');
                label.className = 'module-label';
                label.textContent = `Module ${row + 1}`;
                grid.appendChild(label);

                // Add area cells
                for (let col = 0; col < 6; col++) {
                    const area = document.createElement('div');
                    area.className = 'area';
                    area.classList.add(gridData[row][col] ? 'updated' : 'untouched');
                    area.dataset.row = row;
                    area.dataset.col = col;
                    area.textContent = gridData[row][col] || 'Click to update';
                    if (gridData[row][col]) {
                        const light = document.createElement('div');
                        light.className = 'blinking-light';
                        area.appendChild(light);
                    }
                    area.onclick = () => openModal(row, col);
                    grid.appendChild(area);
                }
            }
        }

        // Open modal to update status
        function openModal(row, col) {
            currentArea = { row, col };
            statusInput.value = gridData[row][col];
            modal.style.display = 'flex';
            statusInput.focus();
        }

        // Close modal
        function closeModal() {
            modal.style.display = 'none';
            currentArea = null;
            statusInput.value = '';
        }

        // Save status
        function saveStatus() {
            if (currentArea) {
                gridData[currentArea.row][currentArea.col] = statusInput.value.trim();
                localStorage.setItem('gridData', JSON.stringify(gridData));
                renderGrid();
                closeModal();
            }
        }

        // Handle Enter key to save status
        statusInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                saveStatus();
            }
        });

        // Simulate real-time updates by polling localStorage
        setInterval(() => {
            const updatedData = JSON.parse(localStorage.getItem('gridData'));
            if (JSON.stringify(updatedData) !== JSON.stringify(gridData)) {
                gridData = updatedData || Array(7).fill().map(() => Array(6).fill(''));
                renderGrid();
            }
        }, 1000);

        // Initial render
        renderGrid();
    </script>
</body>
</html>
