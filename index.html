<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Area Status Grid</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
    }
    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
    .grid-container {
      display: grid;
      grid-template-columns: 100px repeat(6, 150px);
      gap: 10px;
      margin-bottom: 40px;
    }
    .module-label {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      background-color: #dee2e6;
      border: 2px solid #333;
    }
    .area {
      width: 150px;
      height: 100px;
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.3s;
      position: relative;
      background-color: #add8e6;
    }
    .area.updated {
      background-color: #90ee90;
    }
    .area:hover {
      filter: brightness(90%);
    }
    .modal, .history-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content, .history-content {
      background: white;
      padding: 20px;
      border-radius: 8px;
      width: 350px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-content input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }
    .modal-content button, .history-content button {
      padding: 8px 16px;
      margin-right: 8px;
      cursor: pointer;
    }
    .timeline {
      border-left: 3px solid #007bff;
      padding-left: 10px;
      margin-top: 10px;
    }
    .timeline-entry {
      margin-bottom: 12px;
    }
    .timeline-entry time {
      font-size: 12px;
      color: #555;
    }
    .auth-box {
      margin-bottom: 20px;
    }
    #analytics {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="auth-box" id="authBox">
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button onclick="signIn()">Sign In</button>
      <button onclick="signUp()">Sign Up</button>
    </div>
    <div style="display:none;" id="mainContent">
      <h1>Area Status Grid</h1>
      <button onclick="logout()">Logout</button>
      <div class="grid-container" id="grid"></div>
      <div id="analytics">Analytics Placeholder</div>
    </div>
  </div>  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Update Area Status</h2>
      <input type="text" id="statusInput" maxlength="50" placeholder="Enter status" />
      <button onclick="saveStatus()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>  <div class="history-modal" id="historyModal">
    <div class="history-content">
      <h2>Update History</h2>
      <div class="timeline" id="historyTimeline"></div>
      <button onclick="closeHistory()">Close</button>
    </div>
  </div>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>  <script>
    const supabaseUrl = 'https://kxbpsfxcploqijsinxes.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4YnBzZnhjcGxvcWlqc2lueGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI1NjAzNTMsImV4cCI6MjA2ODEzNjM1M30.CQr9DvVf2are2VnK9VLviKBWlN401n-U2gOXrg5F5OE';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let currentUser = null;
    let currentArea = null;
    let currentAreaId = null;

    async function signIn() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (data.user) init();
      else alert(error.message);
    }

    async function signUp() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (data.user) alert('User registered, now log in.');
      else alert(error.message);
    }

    async function logout() {
      await supabase.auth.signOut();
      location.reload();
    }

    async function init() {
      document.getElementById('authBox').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      renderGrid();
    }

    async function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (let row = 0; row < 7; row++) {
        const label = document.createElement('div');
        label.className = 'module-label';
        label.textContent = `Module ${row + 1}`;
        grid.appendChild(label);

        for (let col = 0; col < 6; col++) {
          const areaId = `${row}-${col}`;
          const { data: statusData } = await supabase.from('areas').select('*').eq('area_id', areaId).single();
          const area = document.createElement('div');
          area.className = 'area';
          if (statusData?.status) {
            area.classList.add('updated');
            area.textContent = statusData.status;
          } else {
            area.textContent = 'Click to update';
          }
          area.onclick = () => openModal(row, col);
          area.ondblclick = () => openHistory(areaId);
          grid.appendChild(area);
        }
      }
    }

    function openModal(row, col) {
      currentArea = { row, col };
      currentAreaId = `${row}-${col}`;
      document.getElementById('statusInput').value = '';
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function saveStatus() {
      const status = document.getElementById('statusInput').value.trim();
      if (!status) return;
      await supabase.from('areas').upsert({ area_id: currentAreaId, status });
      await supabase.from('logs').insert({ area_id: currentAreaId, status, user_email: currentUser?.email || 'unknown' });
      closeModal();
      renderGrid();
    }

    async function openHistory(areaId) {
      const { data: logs } = await supabase.from('logs').select('*').eq('area_id', areaId).order('created_at', { ascending: false });
      const container = document.getElementById('historyTimeline');
      container.innerHTML = '';
      logs.forEach(log => {
        const entry = document.createElement('div');
        entry.className = 'timeline-entry';
        entry.innerHTML = `<time>${new Date(log.created_at).toLocaleString()}</time><br><strong>${log.status}</strong> <br><small>by ${log.user_email}</small>`;
        container.appendChild(entry);
      });
      document.getElementById('historyModal').style.display = 'flex';
    }

    function closeHistory() {
      document.getElementById('historyModal').style.display = 'none';
    }

    // Check login on page load
    supabase.auth.getUser().then(({ data: { user } }) => {
      if (user) {
        currentUser = user;
        init();
      }
    });
  </script></body>
</html>
