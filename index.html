<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Area Status Grid</title>
  <style>
    body {
      font-family: sans-serif;
      background: #222;
      color: #eee;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .grid-container {
      display: grid;
      grid-template-columns: 100px repeat(6, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .module-label {
      background: #444;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      height: 80px;
    }
    .area {
      background: #555;
      border: 2px solid #777;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 14px;
      position: relative;
    }
    .area.updated {
      background-color: #4caf50;
    }
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Area Status Grid</h1>
  <div class="grid-container" id="grid"></div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Update Area Status</h2>
      <input type="text" id="statusInput" placeholder="Enter new status">
      <br/><br/>
      <button onclick="saveStatus()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const supabase = supabase.createClient(
      'https://pefxxpapmtlthwniosex.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlZnh4cGFwbXRsdGh3bmlvc2V4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI1NjIxNTgsImV4cCI6MjA2ODEzODE1OH0.d-fhwEDACY6drKzWTb27tEUMF7TWVLu4aLZBt7ItERY'
    );

    const grid = document.getElementById('grid');
    const modal = document.getElementById('modal');
    const statusInput = document.getElementById('statusInput');
    let currentCell = null;

    async function fetchGrid() {
      const { data, error } = await supabase.from('grid').select('*');
      if (error) {
        alert('Error fetching grid');
        return;
      }

      grid.innerHTML = '';
      for (let row = 0; row < 7; row++) {
        const label = document.createElement('div');
        label.className = 'module-label';
        label.textContent = `Module ${row + 1}`;
        grid.appendChild(label);

        for (let col = 0; col < 6; col++) {
          const cellData = data.find(d => d.row === row && d.col === col);
          const area = document.createElement('div');
          area.className = 'area';
          if (cellData?.status) area.classList.add('updated');
          area.textContent = cellData?.status || 'Click to update';
          area.onclick = () => openModal(row, col, cellData?.status || '');
          grid.appendChild(area);
        }
      }
    }

    function openModal(row, col, currentStatus) {
      currentCell = { row, col };
      statusInput.value = currentStatus;
      modal.style.display = 'flex';
      statusInput.focus();
    }

    function closeModal() {
      modal.style.display = 'none';
      currentCell = null;
      statusInput.value = '';
    }

    async function saveStatus() {
      const { row, col } = currentCell;
      const newStatus = statusInput.value.trim();

      await supabase.from('grid')
        .upsert({ row, col, status: newStatus });

      await supabase.from('logs').insert({
        area_id: `${row}-${col}`,
        status: newStatus,
        updated_by: 'public'
      });

      closeModal();
      fetchGrid();
    }

    fetchGrid();
    setInterval(fetchGrid, 3000); // Poll every 3s
  </script>
</body>
</html>
